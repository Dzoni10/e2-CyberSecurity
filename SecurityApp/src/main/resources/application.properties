spring.application.name=SecurityApp

#Database configuration
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/SecurityApp
spring.datasource.username=postgres
spring.datasource.password=super
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.transaction=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.connection.isolation=2

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG

#Mail Service configuration

spring.mail.host=smtp.gmail.com
spring.mail.username=isa.projekti@gmail.com
spring.mail.password=rvybjunymcsnzsbf
spring.mail.port=587
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger konfiguracija
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

#Keystore proprerties

master.passphrase=neki_tvoj_master_password
keystore.storage.dir=/var/securityapp/keystores

# Multipart file upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

# Validation messages
spring.messages.basename=messages
spring.messages.encoding=UTF-8

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# Console logging configuration
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n