<form [formGroup]="recoveryForm" (ngSubmit)="recovery()">
    <div class="form-container" @slideIn>
        <mat-form-field>
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="text"/>
        </mat-form-field>
        <mat-form-field>
        <mat-label>New Password</mat-label>
            <input matInput formControlName="password" (input)="checkPasswordStrength()"  type="password"/>
            <p *ngIf="passwordStrength===0&& recoveryForm.get('newPassword')?.value" class="very-weak">Very weak</p>
            <p *ngIf="passwordStrength===1" class="weak">Weak</p>
            <p *ngIf="passwordStrength===2" class="medium">Medium</p>
            <p *ngIf="passwordStrength===3" class="strong">Strong</p>
            <p *ngIf="passwordStrength===4" class="very-strong">Very strong</p>
        </mat-form-field>
        <mat-form-field>
        <mat-label>Input again password</mat-label>
            <input matInput formControlName="password2" type="password"/>
        </mat-form-field>

        <div class="captcha" id="recaptcha-container"></div>
    
    <button class="btnChange" color="primary" type="submit" color="primary" mat-raised-button>Change password</button>
    </div>
</form>
