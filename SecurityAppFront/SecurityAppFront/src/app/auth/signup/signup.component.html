
<form [formGroup]="signupForm" (ngSubmit)="register()">
    <div class="form-container" @slideIn>
        <mat-form-field>
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" type="text"/>
        </mat-form-field>
        <mat-form-field>
            <mat-label>Surname</mat-label>
            <input matInput formControlName="surname" type="text"/>
        </mat-form-field>
        <mat-form-field>
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="text"/>
        </mat-form-field>
        <mat-form-field>
            <mat-label>Password</mat-label>
            <input matInput formControlName="password" (input)="checkPasswordStrength()" type="password"/>
            <p *ngIf="passwordStrength===0&& signupForm.get('password')?.value" class="very-weak">Very weak</p>
            <p *ngIf="passwordStrength===1" class="weak">Weak</p>
            <p *ngIf="passwordStrength===2" class="medium">Medium</p>
            <p *ngIf="passwordStrength===3" class="strong">Strong</p>
            <p *ngIf="passwordStrength===4" class="very-strong">Very strong</p>
        </mat-form-field>
        <mat-form-field>
        <mat-label>Input password again</mat-label>
            <input matInput formControlName="password2" type="password"/>
        </mat-form-field>
    <mat-form-field>
        <mat-label>Organization</mat-label>
        <input matInput formControlName="organization" type="text"/>
    </mat-form-field>

    <button color="primary" type="submit" mat-raised-button>Register</button>
    </div>
</form>
